<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热搜话题词优化工具 · P1 演示</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f4f5f7; color: #1d2129; line-height: 1.6;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  header p { color: #86909c; font-size: 14px; margin-top: 6px; }
  .card {
    background: #fff; border-radius: 14px; padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  .input-card { margin-bottom: 20px; }
  label { font-size: 13px; color: #4e5969; font-weight: 600; display: block; margin-bottom: 8px; }
  textarea {
    width: 100%; border: 1.5px solid #e5e6eb; border-radius: 10px;
    padding: 12px 14px; font-size: 15px; resize: vertical; min-height: 72px;
    font-family: inherit; outline: none; transition: border-color .15s;
  }
  textarea:focus { border-color: #165dff; }
  .hint { font-size: 12px; color: #a9aeb8; margin-top: 6px; }
  button {
    margin-top: 14px; width: 100%; border: 0; border-radius: 10px;
    background: #165dff; color: #fff; font-size: 16px; font-weight: 600;
    padding: 13px; cursor: pointer; transition: background .15s;
  }
  button:hover { background: #0e42d2; }
  .meta-bar {
    font-size: 12px; color: #86909c; margin: 18px 2px 10px;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
  }
  .result { margin-bottom: 14px; }
  .result .phrase { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .row { font-size: 13.5px; color: #4e5969; margin: 5px 0; }
  .row b { color: #1d2129; font-weight: 600; }
  .tag {
    display: inline-block; background: #e8f3ff; color: #165dff;
    border-radius: 6px; padding: 1px 8px; font-size: 12px; font-weight: 600;
  }
  .chip {
    display: inline-block; background: #fff3e8; color: #ff7d00;
    border-radius: 6px; padding: 1px 8px; font-size: 12px; font-weight: 600;
  }
  .badge { float: right; border-radius: 8px; padding: 3px 12px; font-size: 13px; font-weight: 700; color: #fff; }
  .badge.h { background: #f53f3f; }
  .badge.m { background: #ff7d00; }
  .badge.l { background: #c9cdd4; }
  .disclaimer { font-size: 11.5px; color: #c9cdd4; margin-top: 10px; border-top: 1px dashed #f0f1f3; padding-top: 8px; }
  .foot { text-align: center; font-size: 12px; color: #c9cdd4; margin-top: 28px; line-height: 1.8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>热搜话题词优化工具</h1>
    <p>输入话题方向，AI 给出更易上榜的话题词 + 理由 · P1 演示版</p>
  </header>

  <div class="card input-card">
    <label>你的话题方向 / 现有话题词</label>
    <textarea id="topic" placeholder="例如：新能源车降价、最难吃的水果、明星演唱会…"></textarea>
    <div class="hint">演示用真实微博热搜样本数据。生产版接实时热搜后，蹭的是当下在涨的词。</div>
    <button onclick="run()">生成优化话题词</button>
  </div>

  <div id="meta" class="meta-bar" style="display:none"></div>
  <div id="out"></div>

  <div class="foot">
    P1 演示 · 句式库为经验值，生产版由 AI 滚动刷新<br>
    传播潜力为相对评分，<b>不保证上榜</b>——热度还取决于发布时机、账号权重、突发事件
  </div>
</div>

<script>
const HOTWORDS = [{"rank": 1, "title": "葡萄牙首发"}, {"rank": 2, "title": "理想L8价格"}, {"rank": 3, "title": "万千气象看重庆"}, {"rank": 4, "title": "女装退货率终于有救了"}, {"rank": 5, "title": "美股"}, {"rank": 6, "title": "你要知道我很少站老一辈这边的"}, {"rank": 7, "title": "C罗首发"}, {"rank": 8, "title": "南部档案 三个结局"}, {"rank": 9, "title": "2025T1冠军皮肤"}, {"rank": 10, "title": "檀健次直播迟到39分钟"}, {"rank": 11, "title": "平台通报李金铭假婆婆事件"}, {"rank": 12, "title": "柬埔寨电诈 刘忍"}, {"rank": 13, "title": "乔欣变样了"}, {"rank": 14, "title": "王伊瑶透露赵丽颖近况"}, {"rank": 15, "title": "C罗再进两球将创葡足历史"}, {"rank": 16, "title": "李金铭回应"}, {"rank": 17, "title": "广德车祸受伤3岁男童最新情况"}, {"rank": 18, "title": "杨幂杨紫白玉兰提名VCR"}, {"rank": 19, "title": "日本公寓藏尸15年"}, {"rank": 20, "title": "papi酱 非常清醒的内容创作者"}, {"rank": 21, "title": "高考成绩"}, {"rank": 22, "title": "开屏广告没了"}, {"rank": 23, "title": "恋与深空"}, {"rank": 24, "title": "唐艺昕李小冉王濛顶峰相见"}, {"rank": 25, "title": "穆祉丞泡泡更新"}, {"rank": 26, "title": "在图书馆被紫外消毒灯照了12个小时"}, {"rank": 27, "title": "印度一天或热死3400人"}, {"rank": 28, "title": "田曦薇魏大勋赢家拍摄90天"}, {"rank": 29, "title": "霍尔木兹海峡已免费开放"}, {"rank": 30, "title": "台湾渔民说只有大陆海警保护我们"}, {"rank": 31, "title": "广德致1死2伤司机或3年以下刑期"}, {"rank": 32, "title": "马嘉祺宋亚轩同窗四年"}, {"rank": 33, "title": "马宁第3次执法来了"}, {"rank": 34, "title": "龚俊工作室富有但小气"}, {"rank": 35, "title": "张凌赫请开推吃水蜜桃"}, {"rank": 36, "title": "恋与深空的野心莫透支玩家信任"}, {"rank": 37, "title": "宋亚轩晒毕业照"}, {"rank": 38, "title": "林允撑伞神图有了"}, {"rank": 39, "title": "C罗母亲无声抗议"}, {"rank": 40, "title": "杨紫行程 真脚不着地了"}, {"rank": 41, "title": "比亚迪重走马可波罗之路"}, {"rank": 42, "title": "登陆少年空降"}, {"rank": 43, "title": "ENC大名单"}, {"rank": 44, "title": "马宁出任挪威vs法国第四官员"}, {"rank": 45, "title": "刘国梁女儿惊讶爸爸曾经这么帅"}, {"rank": 46, "title": "谢可寅演技"}, {"rank": 47, "title": "肖战白玉兰VCR"}, {"rank": 48, "title": "英伟达紧急辟谣"}, {"rank": 49, "title": "左航借口上厕所和学弟合照"}, {"rank": 50, "title": "新能源车保养别踩坑"}];
const HOTWORDS_SRC = "实时微博热搜（2026-06-24，每小时更新）";
// ===== 易传播句式库（经验值，生产版由 LLM 定期刷新）=====
const PATTERNS = [
  { name: "数字+反差冲突", tmpl: t => `${t}一夜之间变了`,        hint: "具体数字 + 反差，制造冲突感，易引发讨论", w: 0.9 },
  { name: "群体共鸣+悬念", tmpl: t => `${t}的人现在都在想什么`,   hint: "锚定一类人群，留悬念，便于转述",          w: 0.85 },
  { name: "权威回应/官宣", tmpl: t => `官方回应${t}`,             hint: "'回应/官宣/确诊' 自带新闻感，上榜高频结构", w: 0.8 },
  { name: "疑问句钩子",     tmpl: t => `为什么${t}突然火了`,       hint: "疑问句激发好奇，提高搜索热度",            w: 0.75 },
  { name: "极端化形容",     tmpl: t => `${t}有多离谱`,            hint: "'有多x' 制造预期落差，互动率高",          w: 0.7 },
];
const DISCLAIMER = "不保证上榜；受发布时机、账号权重、突发事件影响，句式仅占热度一小部分";

// ===== 字符 bigram 重叠：中文无分词，用二元组召回相关热词 =====
function shingles(text) {
  const cjk = (text.match(/[一-龥]/g) || []).join("");
  const s = new Set();
  for (let i = 0; i < cjk.length - 1; i++) s.add(cjk.slice(i, i + 2));
  (text.toLowerCase().match(/[a-z0-9]{2,}/g) || []).forEach(w => s.add(w));
  return s;
}
function relatedHotwords(topic, n = 3) {
  const t = shingles(topic);
  const scored = [];
  for (const it of HOTWORDS) {
    const o = [...shingles(it.title)].filter(x => t.has(x)).length;
    if (o > 0) scored.push([o, it.title]);
  }
  scored.sort((a, b) => b[0] - a[0]);
  return scored.slice(0, n).map(x => x[1]);
}
function score(w, hits) {
  const raw = 0.6 * w + 0.4 * Math.min(hits / 2, 1);
  if (raw >= 0.7) return ["高", "h", raw];
  if (raw >= 0.45) return ["中", "m", raw];
  return ["低", "l", raw];
}

function run() {
  const topic = document.getElementById("topic").value.trim();
  const out = document.getElementById("out");
  const meta = document.getElementById("meta");
  if (!topic) { out.innerHTML = ""; meta.style.display = "none"; return; }

  const hits = relatedHotwords(topic);
  const ride = hits[0] || null;
  let results = PATTERNS.map(p => {
    const [lvl, cls, raw] = score(p.w, hits.length);
    return { phrase: p.tmpl(topic), pattern: p.name, hint: p.hint, ride, lvl, cls, raw };
  }).sort((a, b) => b.raw - a.raw);

  meta.style.display = "flex";
  meta.innerHTML = `<span>热词数据：${HOTWORDS_SRC}</span><span>生成模式：句式启发式（演示）</span>`;

  out.innerHTML = results.map((r, i) => `
    <div class="card result">
      <span class="badge ${r.cls}">${r.lvl} ${r.raw.toFixed(2)}</span>
      <div class="phrase">${i + 1}. ${r.phrase}</div>
      <div class="row">命中句式：<span class="tag">${r.pattern}</span></div>
      <div class="row" style="color:#86909c;font-size:12.5px">${r.hint}</div>
      <div class="row">蹭的热词：${r.ride ? `<span class="chip">${r.ride}</span>` : "（未匹配到相关在榜热词）"}</div>
      <div class="disclaimer">${DISCLAIMER}</div>
    </div>`).join("");
}

document.getElementById("topic").addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) run();
});
</script>
</body>
</html>
